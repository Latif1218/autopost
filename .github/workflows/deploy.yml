name: Docker CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: mdsumon12ir/ottopostai:latest

      - name: Deploy VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}

          script: |
            mkdir -p /root/myapp

            cd /root/myapp

            cat > docker-compose.yml << 'EOF'
            version: '3.8'

            services:
              app:
                image: mdsumon12ir/ottopostai:latest

                container_name: myapp

                ports:
                  - "127.0.0.1:8000:8000"

                env_file:
                  - .env

                restart: always
            EOF

            docker compose pull
            docker compose down
            docker compose up -d

            docker image prune -f