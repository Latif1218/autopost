name: Docker CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: mdsumon12ir/ottomaxai:latest

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: root
          password: ${{ secrets.VPS_PASSWORD }}
          script: |
            cd /root/myapp

            cat > docker-compose.yml << 'EOF'
            version: '3.8'

            services:
              app:
                image: mdsumon12ir/ottomaxai:latest
                container_name: ottomaxai_app
                restart: always
                ports:
                  - "127.0.0.1:8000:8000"
                env_file:
                  - .env
            EOF

            docker-compose pull
            docker-compose down
            docker-compose up -d
            docker image prune -f